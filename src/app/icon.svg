<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64" role="img" aria-label="OneArtPix">
  <defs>
    <!-- Dégradé doré (reflet subtil) -->
    <linearGradient id="oapGold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#E4CC97"/>
      <stop offset="0.5" stop-color="#C9A96E"/>
      <stop offset="1" stop-color="#A9884E"/>
    </linearGradient>
  </defs>

  <!-- Fond ardoise arrondi (contraste sur onglets clairs comme sombres) -->
  <rect x="2" y="2" width="60" height="60" rx="15" fill="#0E1116"/>
  <!-- Filet doré discret sur le bord -->
  <rect x="2.75" y="2.75" width="58.5" height="58.5" rx="14.25"
        fill="none" stroke="#C9A96E" stroke-opacity="0.22" stroke-width="1.5"/>

  <!-- Le "O" doré (anneau) -->
  <circle cx="32" cy="32" r="16.5" fill="none" stroke="url(#oapGold)" stroke-width="6"/>
</svg>
